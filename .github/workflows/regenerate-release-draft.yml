name: Release regeneration signal

on:
  pull_request_target:
    types:
      - closed

permissions: {}

jobs:
  signal:
    if: github.repository == 'fablebookjs/lab-01'
    runs-on: ubuntu-24.04
    steps:
      - name: Emit a fixed read-only close wake-up
        run: >-
          test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01" &&
          test "$GITHUB_EVENT_NAME" = "pull_request_target"
