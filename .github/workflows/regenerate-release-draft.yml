name: Regenerate closed release draft

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: maintain-release-draft-v1.0
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Assert the laboratory repository
        run: test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01"

      - name: Check out trusted release-line code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: releases/v1.0

      - name: Reconcile the closed release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/regenerate-release-draft.mjs
