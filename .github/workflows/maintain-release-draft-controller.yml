name: Maintain release draft

on:
  workflow_run:
    workflows:
      - Release maintenance signal
      - Release regeneration signal
    types:
      - completed
  workflow_dispatch:

permissions: {}

concurrency:
  group: maintain-release-draft-v1.0
  cancel-in-progress: false

jobs:
  maintain:
    if: >-
      github.repository == 'fablebookjs/lab-01' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Check out the exact trusted default-main controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Install pinned Node without package-manager cache
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Bootstrap the closed fixed npm observer
        run: >-
          node scripts/bootstrap-npm-cli.mjs
          --repository-root "$GITHUB_WORKSPACE"
          --path-file "$GITHUB_PATH"

      - name: Re-observe and regenerate a closed current proposal if needed
        id: regenerate
        env:
          EXPECTED_DISPATCH_SHA: ${{ github.sha }}
          EXPECTED_WORKFLOW_SHA: ${{ github.workflow_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/regenerate-release-draft.mjs --if-needed

      - name: Re-observe and maintain the durable release lifecycle
        if: steps.regenerate.outputs.maintain == 'true'
        env:
          EXPECTED_DISPATCH_SHA: ${{ github.sha }}
          EXPECTED_WORKFLOW_SHA: ${{ github.workflow_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/maintain-release-draft.mjs
