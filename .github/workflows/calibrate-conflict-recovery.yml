name: Calibrate conflict recovery

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Fixed conflict recovery phase to exercise
        required: true
        type: choice
        options:
          - inject-after-force
          - resume

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: calibration-g1-conflict-recovery
  cancel-in-progress: false

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Assert the fixed laboratory target
        run: |
          test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01"
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "$GITHUB_REF" = "refs/heads/main"

      - name: Check out trusted main code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.sha }}

      - name: Exercise the fixed conflict recovery graph
        id: calibrate
        continue-on-error: true
        run: node scripts/calibrate-conflict-recovery.mjs --mode "$MODE"
        env:
          MODE: ${{ inputs.mode }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Preserve the expected terminal status
        if: always()
        env:
          MODE: ${{ inputs.mode }}
          STEP_OUTCOME: ${{ steps.calibrate.outcome }}
          FAILURE_POINT: ${{ steps.calibrate.outputs.failure_point }}
          BACKUP_SHA: ${{ steps.calibrate.outputs.backup_sha }}
          EXPECTED_BACKUP_SHA: ${{ steps.calibrate.outputs.expected_backup_sha }}
          BACKUP_VERIFIED: ${{ steps.calibrate.outputs.backup_verified }}
          LINE_SHA: ${{ steps.calibrate.outputs.line_sha }}
        run: |
          if test "$MODE" = "inject-after-force"; then
            test "$STEP_OUTCOME" = "failure"
            test "$FAILURE_POINT" = "after-durable-force-before-pr"
            test -n "$BACKUP_SHA"
            test -n "$EXPECTED_BACKUP_SHA"
            test -n "$LINE_SHA"
            if test "$BACKUP_VERIFIED" = "true"; then
              test "$BACKUP_SHA" = "$EXPECTED_BACKUP_SHA"
            else
              test "$BACKUP_VERIFIED" = "false"
            fi
            echo "Intentional failure retained after durable force and before PR creation" >&2
            exit 1
          fi
          test "$STEP_OUTCOME" = "success"
