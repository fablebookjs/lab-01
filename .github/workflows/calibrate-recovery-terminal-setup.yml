name: Set up recovery-terminal calibration

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: calibration-g1-recovery-terminal
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Assert the fixed laboratory target
        run: |
          test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01"
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "$GITHUB_REF" = "refs/heads/main"

      - name: Check out trusted main code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Create the dedicated recovery graph
        run: node scripts/calibrate-recovery-terminal.mjs --mode setup
        env:
          GITHUB_TOKEN: ${{ github.token }}
