name: Ready release QA signal

on:
  pull_request:
    branches:
      - releases/v1.0
    types:
      - ready_for_review

permissions: {}

jobs:
  signal:
    if: github.repository == 'fablebookjs/lab-01'
    runs-on: ubuntu-24.04
    steps:
      - name: Emit a fixed read-only Ready QA wake-up
        run: >-
          test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01" &&
          test "$GITHUB_EVENT_NAME" = "pull_request"
