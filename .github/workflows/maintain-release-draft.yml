name: Release maintenance signal

on:
  push:
    branches:
      - releases/v1.0

permissions: {}

jobs:
  signal:
    if: github.repository == 'fablebookjs/lab-01'
    runs-on: ubuntu-24.04
    steps:
      - name: Emit a fixed read-only release maintenance wake-up
        run: >-
          test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01" &&
          test "$GITHUB_EVENT_NAME" = "push" &&
          test "$GITHUB_REF" = "refs/heads/releases/v1.0"
