name: Maintain release draft

on:
  push:
    branches:
      - releases/v1.0
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: maintain-release-draft-v1.0
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Assert the laboratory repository
        run: test "$GITHUB_REPOSITORY" = "fablebookjs/lab-01"

      - name: Check out the current release line
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: releases/v1.0

      - name: Maintain the existing release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/maintain-release-draft.mjs
