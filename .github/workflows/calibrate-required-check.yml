name: Required check calibration

on:
  pull_request:
    branches:
      - calibration/g1/required-check-pr/base
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

concurrency:
  group: calibration-g1-required-check-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  current-head-authorization:
    name: Required calibration head
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the exact trusted calibration base
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Require the exact current PR-body-authorized head
        run: node scripts/check-required-calibration-head.mjs
